<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="/assets/css/style.css" rel="stylesheet"> <title>Blog | My Portfolio</title>
</head>
<body>
    <main id="main" style="margin-top: 80px;"> <section class="inner-page">
            <div class="container">
                <div class="section-title">
                    <h2>Interesting Things</h2>
                    <p>My latest thoughts and projects.</p>
                </div>

                <div class="row">
                    {% for post in site.posts %}
                    <div class="col-lg-12">
                        <article style="margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 20px;">
                            <h3><a href="{{ post.url }}">{{ post.title }}</a></h3>
                            <time style="color: #888;">{{ post.date | date: "%B %d, %Y" }}</time>
                            <p>{{ post.excerpt | strip_html | truncatewords: 30 }}</p>
                            <a href="{{ post.url }}" class="btn-get-started" style="color: #0563af;">Read More →</a>
                        </article>
                    </div>
                    {% endfor %}
                </div>
                <a href="/index.html">← Back to Portfolio</a>
            </div>
        </section>
    </main>
</body>
</html>
