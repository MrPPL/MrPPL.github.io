# This header tells Jekyll to process this file
---
<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="assets/css/style.css"> <title>My Blog</title>
</head>
<body>
    <h1>My Blog Posts</h1>
    <ul>
      {% for post in site.posts %}
        <li>
          <a href="{{ post.url }}">{{ post.title }}</a> - {{ post.date | date_to_string }}
        </li>
      {% endfor %}
    </ul>
    <a href="index.html">Back to Home</a>
</body>
</html>
